# PSFEx preset for completeness testing
# Low-order PSF model, no check plots/images, quiet mode

#-------------------------------- PSF model ----------------------------------

# Only the spatially-constant PSF is consumed (the completeness injection
# extracts the zeroth-order term and feeds a single stamp to SkyMaker), so a
# constant fit with a moderate pixel basis suffices. BASIS_NUMBER dominates
# the runtime (20 -> 10 measured 72 -> 17 s per sub-tile catalog) at a
# stamp difference of <1% of peak / 0.7% FWHM — far below the
# iteration-to-iteration scatter of the completeness measurement.
BASIS_TYPE:      PIXEL_AUTO
BASIS_NUMBER:    10
PSF_SAMPLING:    0.0
PSF_PIXELSIZE:   1.0
PSF_ACCURACY:    0.01
PSF_SIZE:        51,51
PSF_RECENTER:    N
MEF_TYPE:        INDEPENDENT

#------------------------- Point source measurements -------------------------

CENTER_KEYS:     XWIN_IMAGE,YWIN_IMAGE
PHOTFLUX_KEY:    FLUX_APER
PHOTFLUXERR_KEY: FLUXERR_APER

#----------------------------- PSF variability -------------------------------

# Constant PSF: the degree-2 spatial polynomial was fitted and then thrown
# away (only the zeroth-order component is used). A degree-0 fit yields the
# sample-weighted mean PSF of the sub-tile — at least as representative for
# injection across the sub-tile as the field-centre PSF it replaces.
PSFVAR_KEYS:     XWIN_IMAGE,YWIN_IMAGE
PSFVAR_GROUPS:   1,1
PSFVAR_DEGREES:  0
PSFVAR_NSNAP:    1
HIDDENMEF_TYPE:  COMMON
STABILITY_TYPE:  EXPOSURE

#----------------------------- Sample selection ------------------------------

SAMPLE_AUTOSELECT:  Y
SAMPLEVAR_TYPE:     SEEING
SAMPLE_FWHMRANGE:   1.0,5.0
SAMPLE_VARIABILITY: 0.3
SAMPLE_MINSN:       20
SAMPLE_MAXELLIP:    0.2
SAMPLE_FLAGMASK:    0x00fe
BADPIXEL_FILTER:    Y

#----------------------------- Output catalogs -------------------------------

OUTCAT_TYPE:        NONE

#------------------------------- Check-plots ----------------------------------

CHECKPLOT_TYPE:     NONE

#------------------------------ Check-Images ---------------------------------

CHECKIMAGE_TYPE:    NONE

#----------------------------- Miscellaneous ---------------------------------

PSF_DIR:
PSF_SUFFIX:      .psf
VERBOSE_TYPE:    QUIET
WRITE_XML:       N
NTHREADS:        1
